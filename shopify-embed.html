<!-- Option A: Embed via iframe (paste in Shopify page HTML editor) -->
<!-- Replace YOUR_RENDER_URL with your actual Render deployment URL -->
<div style="width:100%;height:90vh;border:none;border-radius:12px;overflow:hidden;">
  <iframe 
    src="YOUR_RENDER_URL" 
    style="width:100%;height:100%;border:none;" 
    allow="clipboard-write"
    title="ProfitPilot Dashboard">
  </iframe>
</div>
